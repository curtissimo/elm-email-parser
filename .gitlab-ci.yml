stages:
  - cache
  - lint
  - test
  - build
  - publish

variables:
  NODE_VERSION: '24'

.base: &defaults
  image: node:${NODE_VERSION}
  cache:
    - key:
        files:
          - elm.json
      paths:
        - ~/.elm/
      policy: pull
    - key:
        files:
          - package.json
      paths:
        - .npm/
      policy: pull
  before_script:
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npx elm make --optimize --output=/dev/null src/Curtissimo/Email.elm
  script:
    - echo "Base job"

prime:
  image: node:${NODE_VERSION}
  cache:
    - key:
        files:
          - elm.json
      paths:
        - ~/.elm/
    - key:
        files:
          - package.json
      paths:
        - .npm/
  stage: cache
  script: 
    - npm ci --cache .npm --prefer-offline --ignore-scripts
    - npx elm make --optimize --output=/dev/null src/Curtissimo/Email.elm

lint:
  <<: *defaults
  stage: lint
  script:
    - npm run lint:format

static-analysis:
  <<: *defaults
  stage: lint
  script:
    - npm run lint:review

verify-examples:
  <<: *defaults
  stage: test
  script:
    - npm run test:docs


publish-pages:
  <<: *defaults
  stage: publish
  pages: true
  script:
    - npm run build:examples
  artifacts:
    paths:
      - public/
  # rules:
    # - if: $CI_COMMIT_TAG


publish-elm-package:
  <<: *defaults
  stage: publish
  dependencies: []
  environment:
    name: production
    url: https://package.elm-lang.org/packages/curtissimo/elm-email-parser/latest/
  script:
    - npx elm publish
  rules:
    - if: $CI_COMMIT_TAG
